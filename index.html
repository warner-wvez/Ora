<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>Illinois Traffic Cameras</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif; }
  #map { position: absolute; inset: 0; }

  #topbar {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-radius: 12px;
    padding: 10px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    max-width: 320px;
  }
  #topbar h1 { font-size: 15px; font-weight: 600; margin: 0 0 2px; color: #1c1c1e; }
  #topbar p { font-size: 12px; margin: 0; color: #6e6e73; }
  #count { font-weight: 600; color: #007aff; }

  .maplibregl-popup-content {
    border-radius: 14px;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }
  .popup-inner { width: 260px; }
  .popup-inner img {
    width: 100%; height: 150px; object-fit: cover; display: block; background: #eee;
  }
  .popup-body { padding: 10px 12px 12px; }
  .popup-body h3 { font-size: 13px; margin: 0 0 4px; color: #1c1c1e; }
  .popup-dirs { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .dir-btn {
    font-size: 11px; padding: 3px 8px; border-radius: 999px;
    background: #f2f2f7; color: #007aff; border: none; cursor: pointer;
    font-weight: 600;
  }
  .dir-btn.active { background: #007aff; color: #fff; }
  .popup-age { font-size: 10px; color: #8e8e93; margin-top: 6px; }

  .cam-marker {
    width: 14px; height: 14px; border-radius: 50%;
    background: #007aff; border: 2px solid #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    cursor: pointer;
  }
  .cam-marker:hover { background: #ff3b30; }
</style>
</head>
<body>
<div id="map"></div>
<div id="topbar">
  <h1>Illinois Traffic Cameras</h1>
  <p><span id="count">-</span> live camera locations, statewide</p>
</div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://tiles.openfreemap.org/styles/positron',
  center: [-88.5, 41.6],
  zoom: 8,
  pitch: 0
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');

let popup = null;

function refreshImg(imgEl, baseUrl) {
  imgEl.src = baseUrl + (baseUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
}

function buildPopupHTML(props) {
  const dirs = props.directions;
  const first = dirs[0];
  return `
    <div class="popup-inner">
      <img id="popup-img" src="${first.snapshot}" alt="${props.name}">
      <div class="popup-body">
        <h3>${props.name}</h3>
        <div class="popup-dirs">
          ${dirs.map((d,i) => `<button class="dir-btn ${i===0?'active':''}" data-idx="${i}">${d.direction || '?'}</button>`).join('')}
        </div>
        <div class="popup-age">refreshes every 15s</div>
      </div>
    </div>
  `;
}

map.on('load', async () => {
  const res = await fetch('cameras.json');
  const data = await res.json();
  document.getElementById('count').textContent = data.features.length.toLocaleString();

  map.addSource('cameras', { type: 'geojson', data, cluster: true, clusterMaxZoom: 12, clusterRadius: 40 });

  map.addLayer({
    id: 'clusters', type: 'circle', source: 'cameras', filter: ['has', 'point_count'],
    paint: {
      'circle-color': '#007aff',
      'circle-radius': ['step', ['get', 'point_count'], 14, 25, 18, 100, 24],
      'circle-opacity': 0.85,
      'circle-stroke-width': 2,
      'circle-stroke-color': '#fff'
    }
  });
  map.addLayer({
    id: 'cluster-count', type: 'symbol', source: 'cameras', filter: ['has', 'point_count'],
    layout: { 'text-field': ['get', 'point_count_abbreviated'], 'text-size': 12, 'text-font': ['Noto Sans Bold'] },
    paint: { 'text-color': '#fff' }
  });
  map.addLayer({
    id: 'cam-points', type: 'circle', source: 'cameras', filter: ['!', ['has', 'point_count']],
    paint: {
      'circle-color': '#007aff',
      'circle-radius': 6,
      'circle-stroke-width': 2,
      'circle-stroke-color': '#fff'
    }
  });

  map.on('click', 'clusters', (e) => {
    const features = map.queryRenderedFeatures(e.point, { layers: ['clusters'] });
    const clusterId = features[0].properties.cluster_id;
    map.getSource('cameras').getClusterExpansionZoom(clusterId, (err, zoom) => {
      if (err) return;
      map.easeTo({ center: features[0].geometry.coordinates, zoom });
    });
  });

  map.on('click', 'cam-points', (e) => {
    const feature = e.features[0];
    const props = JSON.parse(JSON.stringify(feature.properties));
    props.directions = typeof props.directions === 'string' ? JSON.parse(props.directions) : props.directions;
    const coords = feature.geometry.coordinates.slice();

    if (popup) popup.remove();
    popup = new maplibregl.Popup({ closeButton: true, maxWidth: '280px' })
      .setLngLat(coords)
      .setHTML(buildPopupHTML(props))
      .addTo(map);

    let currentIdx = 0;
    let intervalId = null;

    const wireUp = () => {
      const el = popup.getElement();
      const img = el.querySelector('#popup-img');
      intervalId = setInterval(() => refreshImg(img, props.directions[currentIdx].snapshot), 15000);
      el.querySelectorAll('.dir-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentIdx = parseInt(btn.dataset.idx, 10);
          el.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          refreshImg(img, props.directions[currentIdx].snapshot);
        });
      });
    };
    setTimeout(wireUp, 0);

    popup.on('close', () => { if (intervalId) clearInterval(intervalId); });
  });

  map.on('mouseenter', 'cam-points', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'cam-points', () => map.getCanvas().style.cursor = '');
  map.on('mouseenter', 'clusters', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'clusters', () => map.getCanvas().style.cursor = '');
});
</script>
</body>
</html>
